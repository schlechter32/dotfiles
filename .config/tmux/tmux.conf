# ==============================
# Prefix / Unbind Defaults
# ==============================
unbind C-b
set -g prefix C-a

# ==============================
# Core Keybindings
# ==============================
bind ^C new-window -c "$HOME"
bind ^D detach
bind H previous-window
bind L next-window
bind r command-prompt "rename-window %%"
bind R source-file ~/.config/tmux/tmux.conf
bind m resize-pane -Z
bind a copy-mode
bind z switch-client -l
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind -r h resize-pane -L 6
bind -r j resize-pane -D 6
bind -r k resize-pane -U 6
bind -r l resize-pane -R 6
bind : command-prompt
bind q kill-pane
bind x swap-pane -D
bind S choose-session

# ==============================
# Copy Mode (vi)
# ==============================
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection

# ==============================
# Appearance / Behavior
# ==============================
set -g base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g mouse on
set -g renumber-windows on
set -g set-clipboard on
set -g status-interval 3
set -g default-command zsh
set -gq allow-passthrough on

# ==============================
# Status Line
# ==============================
set -g status-left "#[fg=#a6d189,bold,bg=default]#{?client_prefix,,} #S "
set -g status-right "#[fg=#acb0be,bold,bg=default]"
set -ga status-right "󰒋 #H"
# set -ga status-right '#(tmux display-message -p "#{pane_current_path}" | sed "s#$HOME#~#g")'
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100
set -g status-position top
set -g status-style 'bg=default'
set -g window-status-format '#[fg=#a6d189,bg=default] #W'
set -g window-status-current-format '#[fg=#f2d5cf,bg=default] #W#{?window_zoomed_flag,(),}'

# ==============================
# Pane Borders
# ==============================
set -g pane-border-style 'fg=magenta,bg=default'
set -g pane-active-border-style 'fg=white,bg=default'
setw -g pane-border-status top
setw -g pane-border-format '#{?pane_active,#[fg=#ed8796],#[fg=#6e738d]}'

# ==============================
# Colors / Messages
# ==============================
set -g message-command-style bg=default,fg=yellow
set -g message-style bg=default,fg=yellow
set -g mode-style bg=default,fg=yellow
# set-option -g default-terminal 'xterm-256color'
# set-option -g terminal-overrides ',xterm-256color:RGB'
set -g default-terminal 'tmux-256color'
set -as terminal-features ',tmux-256color:RGB'
set -as terminal-features ',xterm-256color:RGB'
set -g focus-events on
set -ga update-environment ' COLORTERM'
set-environment -g COLORTERM truecolor
# ==============================
# Popups / External Tools
# ==============================
bind-key C-y display-popup -E 'nvim -c ":ObsidianNewFromTemplate"'
bind-key -n C-f display-popup -w "90%" -h "85%" -E ~/nbin/sf_script.sh

# CLI utilities (prefix)
bind b display-popup -E "btop"
bind g display-popup -E "lazygit"
bind t display-popup -E "zsh"
bind ^j display-popup -w "95%" -h "90%" -E "tv tmux-sessions"
bind ^o display-popup -w "95%" -h "90%" -E "tv projects"

# No-prefix (Alt / Meta)
# bind -n M-f display-popup -E "zsh"
bind -n M-j display-popup -w "95%" -h "90%" -E "tv tmux-sessions"
bind -n M-o display-popup -w "95%" -h "90%" -E "tv projects"
# M- means "hold Meta/Alt"
set -g @floax-bind '-n M-p'

# ==============================
# Plugins
# ==============================
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'omerxx/tmux-floax'
run '~/.tmux/plugins/tpm/tpm'
